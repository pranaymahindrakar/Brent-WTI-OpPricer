# Curated event calendar for chart annotations.
#
# 'dated' entries pin a note to one timestamp. All dates are verified against
# official sources; add new events as they are confirmed. Do not guess dates.
#
# Sources:
#   OPEC/OPEC+ meetings: https://www.opec.org/opec_web/en/press_room/calendar.htm
#   FOMC:                https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm
#   EIA reports:         https://www.eia.gov/petroleum/supply/weekly/
#
# 'recurring' entries are expanded across the chart span by annotate.py. The EIA
# Weekly Petroleum Status Report lands on Wednesdays at 10:30 ET and is the
# single most market-moving scheduled release for WTI.

dated:
  # OPEC+ Ministerial meetings (Joint Ministerial Monitoring Committee and full
  # ministerial conferences). Dates are the first day of each session.
